<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="パークエンジョイナー">
<title>テーマパークエンジョイナー</title>
<style>
/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --r:14px;--r-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,.1);
  --shadow-lg:0 8px 32px rgba(0,0,0,.18);
  --tdl1:#0d2f6e;--tdl2:#1e5cb8;--tdl3:#e8f0ff;--tdl4:#b8d4ff;
  --tds1:#062040;--tds2:#0d5298;--tds3:#e0f0ff;--tds4:#90caf9;
  --usj1:#1a0000;--usj2:#c44000;--usj3:#fff3e0;--usj4:#ffcc80;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#000;--card:#1c1c1e;--card2:#2c2c2e;--border:rgba(255,255,255,.08);
  --t1:#f0f0f0;--t2:#aeaeb2;--t3:#636366;--sep:#38383a;
}}
@media(prefers-color-scheme:light){:root{
  --bg:#f0f2f5;--card:#fff;--card2:#f5f5f7;--border:rgba(0,0,0,.06);
  --t1:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;--sep:#e5e5ea;
}}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--t1)}

/* ===== LAYOUT ===== */
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
.tab-page{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-page.active{display:flex}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(76px + var(--safe-bottom))}

/* ===== PARK HEADER ===== */
.p-header{color:#fff;flex-shrink:0}
.p-header.tdl{background:linear-gradient(160deg,var(--tdl1) 0%,var(--tdl2) 100%)}
.p-header.tds{background:linear-gradient(160deg,var(--tds1) 0%,var(--tds2) 100%)}
.p-header.usj{background:linear-gradient(160deg,var(--usj1) 0%,var(--usj2) 100%)}

.h-top{display:flex;align-items:center;gap:10px;padding:14px 16px 0}
.park-icon{font-size:26px}
.park-name{flex:1;font-size:17px;font-weight:800;letter-spacing:-.3px;line-height:1.2}
.park-sub{font-size:11px;opacity:.7;font-weight:500}
.btn-ref{background:rgba(255,255,255,.18);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:transform .3s;flex-shrink:0}
.btn-ref.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Weather & Hours Bar ── */
.h-info{display:flex;align-items:center;gap:8px;padding:10px 16px 6px;flex-wrap:wrap}
.h-chip{background:rgba(255,255,255,.15);border-radius:20px;
  padding:5px 12px;font-size:12px;font-weight:600;
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.h-chip.weather-chip{background:rgba(255,255,255,.2)}
.h-chip.hours-chip{}
.h-chip.crowd-low{background:rgba(76,255,145,.25)}
.h-chip.crowd-mid{background:rgba(255,214,10,.25)}
.h-chip.crowd-high{background:rgba(255,150,0,.3)}
.h-chip.crowd-vhigh{background:rgba(255,69,58,.4)}
/* Crowd Meter Card */
.crowd-meter{margin:12px 16px 0;background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);padding:14px;box-shadow:var(--shadow)}
.crowd-meter-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.crowd-meter-title{font-size:12px;font-weight:700;color:var(--t3)}
.crowd-level-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800}
.crowd-bar-wrap{height:8px;background:var(--sep);border-radius:4px;overflow:hidden;margin-bottom:6px}
.crowd-bar{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.16,1,.3,1)}
.crowd-bar.cl{background:linear-gradient(90deg,#4cff91,#00c853)}
.crowd-bar.cm{background:linear-gradient(90deg,#ffd60a,#ff9500)}
.crowd-bar.ch{background:linear-gradient(90deg,#ff9500,#ff5500)}
.crowd-bar.cv{background:linear-gradient(90deg,#ff453a,#c0392b)}
.crowd-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-bottom:10px}
.crowd-detail{display:flex;gap:12px;align-items:center;padding-top:10px;border-top:1px solid var(--sep);flex-wrap:wrap}
.crowd-stat{font-size:12px;color:var(--t3)}.crowd-stat b{color:var(--t1)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4cff91;
  animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Stats ── */
.h-stats{display:flex;gap:8px;padding:6px 16px 10px;overflow-x:auto;scrollbar-width:none}
.h-stats::-webkit-scrollbar{display:none}
.stat-chip{flex-shrink:0;background:rgba(255,255,255,.12);border-radius:16px;
  padding:5px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%}
.sdot.g{background:#4cff91}.sdot.y{background:#ffd60a}.sdot.r{background:#ff453a}

/* ── Search ── */
.h-search{padding:0 16px 12px}
.search-inner{display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.2);border-radius:12px;padding:0 12px;
  backdrop-filter:blur(10px)}
.search-inner input{flex:1;background:transparent;border:none;outline:none;
  color:#fff;font-size:15px;padding:10px 0}
.search-inner input::placeholder{color:rgba(255,255,255,.55)}
.s-icon{font-size:14px;opacity:.8}
.s-clear{background:rgba(255,255,255,.25);border:none;color:#fff;
  border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;
  align-items:center;justify-content:center;display:none;flex-shrink:0}
.s-clear.on{display:flex}

/* ===== FILTER BAR ===== */
.filter-bar{position:sticky;top:0;z-index:20;background:var(--card);
  border-bottom:1px solid var(--sep)}
.filter-scroll{display:flex;gap:8px;overflow-x:auto;padding:10px 16px 8px;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;
  border:1.5px solid var(--sep);background:transparent;color:var(--t2);cursor:pointer;
  transition:all .15s;white-space:nowrap}
.fchip.on-tdl{background:var(--tdl2);border-color:var(--tdl2);color:#fff}
.fchip.on-tds{background:var(--tds2);border-color:var(--tds2);color:#fff}
.fchip.on-usj{background:var(--usj2);border-color:var(--usj2);color:#fff}

/* ===== SHOWS SECTION ===== */
.section{padding:14px 16px 4px}
.sec-title{font-size:13px;font-weight:700;color:var(--t3);letter-spacing:.3px;
  margin-bottom:10px;display:flex;align-items:center;gap:6px}
.shows-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 8px;scrollbar-width:none}
.shows-scroll::-webkit-scrollbar{display:none}
.show-card{flex-shrink:0;width:150px;background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);padding:12px;box-shadow:var(--shadow)}
.show-name{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:6px;
  line-height:1.3;min-height:30px}
.show-loc{font-size:11px;color:var(--t3);margin-bottom:8px}
.show-times{display:flex;flex-wrap:wrap;gap:4px}
.show-time-chip{font-size:11px;font-weight:700;padding:3px 8px;
  border-radius:8px;background:var(--card2);color:var(--t2)}
.show-time-chip.next{background:#e8f4ff;color:#0d5298}
@media(prefers-color-scheme:dark){.show-time-chip.next{background:#0d2040;color:#4da6ff}}

/* ===== RECOMMEND ===== */
.rec-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 6px;scrollbar-width:none}
.rec-scroll::-webkit-scrollbar{display:none}
.rec-card{flex-shrink:0;width:155px;background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);padding:12px;box-shadow:var(--shadow);cursor:pointer;
  transition:transform .15s}
.rec-card:active{transform:scale(.97)}
.rec-rank{font-size:20px;margin-bottom:4px}
.rec-name{font-size:13px;font-weight:700;color:var(--t1);line-height:1.3;
  margin-bottom:6px;min-height:34px}
.stars{font-size:11px;color:#f5a623;margin-bottom:6px}
.rec-wait{display:inline-flex;align-items:baseline;gap:3px;
  padding:4px 10px;border-radius:20px;font-size:14px;font-weight:800}
.rec-tip{font-size:10px;color:var(--t3);margin-top:6px;line-height:1.4}

/* ===== LIST ===== */
.sort-bar{display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 6px}
.sort-label{font-size:13px;color:var(--t3)}
.sort-sel{font-size:13px;color:var(--t2);background:transparent;border:none;
  outline:none;font-family:inherit;cursor:pointer}
.a-list{padding:0 16px 8px}
.a-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);
  margin-bottom:8px;padding:13px;display:flex;align-items:flex-start;gap:11px;
  box-shadow:var(--shadow);cursor:pointer;transition:transform .12s;position:relative;overflow:hidden}
.a-card:active{transform:scale(.99)}
.a-card.closed-card{opacity:.5}
.cat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0;margin-top:2px}
.ci-att{background:#e8f0ff}.ci-show{background:#fff0e8}
.ci-rest{background:#e8fff0}.ci-shop{background:#f8e8ff}.ci-other{background:#f0f0f0}
@media(prefers-color-scheme:dark){
  .ci-att{background:#1a2040}.ci-show{background:#2a1800}
  .ci-rest{background:#0a2010}.ci-shop{background:#200a30}.ci-other{background:#2a2a2a}
}
.a-info{flex:1;overflow:hidden}
.a-name{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.a-stars{font-size:11px;color:#f5a623;margin-bottom:3px}
.a-meta{font-size:12px;color:var(--t3);display:flex;align-items:center;
  gap:6px;flex-wrap:wrap}
.a-tip{font-size:11px;color:var(--t3);margin-top:5px;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.status-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
.sb-open{background:#e8fff0;color:#1a7a3c}.sb-closed{background:#fff0f0;color:#c0392b}
.sb-down{background:#fff8e0;color:#b7770d}
@media(prefers-color-scheme:dark){
  .sb-open{background:#0d3320;color:#4cff91}
  .sb-closed{background:#330d0d;color:#ff6b6b}
  .sb-down{background:#2a2000;color:#ffd60a}
}
.wait-box{flex-shrink:0;min-width:58px;text-align:center;padding:8px;border-radius:12px}
.wait-n{font-size:22px;font-weight:800;line-height:1}
.wait-u{font-size:10px;font-weight:600;opacity:.8}
.w-low{background:#e8fff0;color:#1a7a3c}
.w-mid{background:#fff8e0;color:#b7770d}
.w-hi{background:#fff0e0;color:#c45b00}
.w-vhi{background:#fff0f0;color:#c0392b}
.w-none{background:var(--sep);color:var(--t3)}
@media(prefers-color-scheme:dark){
  .w-low{background:#0d3320;color:#4cff91}.w-mid{background:#2a2000;color:#ffd60a}
  .w-hi{background:#2a1500;color:#ff9f0a}.w-vhi{background:#330d0d;color:#ff6b6b}
  .w-none{background:#2a2a2c;color:#636366}
}
.best-flag{position:absolute;top:0;left:0;
  background:linear-gradient(135deg,#ffd700,#ff8c00);color:#fff;
  font-size:10px;font-weight:800;padding:3px 10px 3px 8px;
  border-bottom-right-radius:10px;letter-spacing:.3px}
.area-tag{font-size:10px;padding:1px 6px;border-radius:5px;
  background:var(--card2);color:var(--t3);font-weight:600}

/* ===== LOADING / EMPTY ===== */
.loading-box,.empty-box{padding:48px 24px;text-align:center;color:var(--t3)}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--sep);
  animation:spin .8s linear infinite;margin:0 auto 16px}
.sp-tdl{border-top-color:var(--tdl2)}.sp-tds{border-top-color:var(--tds2)}.sp-usj{border-top-color:var(--usj2)}
.load-text{font-size:15px;color:var(--t2);font-weight:500}
.no-res{padding:32px 16px;text-align:center;color:var(--t3);font-size:15px}

/* ===== DATA SOURCE ===== */
.data-src{text-align:center;padding:8px 16px;font-size:11px;color:var(--t3);
  display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.demo-badge{background:#fff3e0;color:#e65100;padding:2px 8px;border-radius:6px;font-weight:700}

/* ===== BOTTOM NAV ===== */
.b-nav{position:fixed;bottom:0;left:0;right:0;padding-bottom:var(--safe-bottom);
  background:var(--card);border-top:1px solid var(--sep);
  display:flex;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 6px;cursor:pointer;border:none;background:transparent;transition:opacity .15s}
.nav-btn:active{opacity:.6}
.nav-em{font-size:22px;line-height:1;margin-bottom:3px}
.nav-lbl{font-size:10px;font-weight:600;color:var(--t3)}
.nav-btn.on-tdl .nav-lbl,.nav-btn.on-tdl .nav-em{filter:none}
.nav-btn.on-tdl .nav-lbl{color:var(--tdl2)}
.nav-btn.on-tds .nav-lbl{color:var(--tds2)}
.nav-btn.on-usj .nav-lbl{color:var(--usj2)}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;
  width:100%;padding:0 0 calc(20px + var(--safe-bottom));
  animation:slideUp .28s cubic-bezier(.16,1,.3,1);max-height:85vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-handle{width:36px;height:4px;background:var(--sep);border-radius:2px;margin:12px auto 0}
.m-head{padding:16px 20px 14px;border-bottom:1px solid var(--sep);position:relative}
.m-title{font-size:20px;font-weight:800;margin-bottom:4px}
.m-sub{font-size:13px;color:var(--t3);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.m-close{position:absolute;top:14px;right:16px;background:var(--sep);border:none;
  color:var(--t2);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.m-body{padding:16px 20px}
.m-stat{display:flex;justify-content:space-between;align-items:flex-start;
  padding:12px 0;border-bottom:1px solid var(--sep)}
.m-stat:last-child{border:none}
.m-stat-l{font-size:14px;color:var(--t2)}
.m-stat-r{font-size:15px;font-weight:700;color:var(--t1);text-align:right;max-width:65%}
.m-highlight{background:var(--card2);border-radius:12px;padding:14px;margin-top:12px}
.m-highlight-title{font-size:12px;font-weight:700;color:var(--t3);margin-bottom:8px}
.m-highlight-text{font-size:14px;color:var(--t2);line-height:1.6}
.strategy-box{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.1));
  border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:14px;margin-top:12px}
.strategy-title{font-size:12px;font-weight:700;color:#6366f1;margin-bottom:6px}
.strategy-text{font-size:13px;color:var(--t2);line-height:1.6}

/* ===== RESPONSIVE iPad ===== */
@media(min-width:768px){
  .rec-scroll{display:grid;grid-template-columns:repeat(4,1fr);overflow-x:visible;padding:0 16px}
  .rec-card{width:auto}
  .a-list{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .a-list .a-card{margin-bottom:0}
  .shows-scroll{display:grid;grid-template-columns:repeat(3,1fr);overflow-x:visible;padding:0 16px}
  .show-card{width:auto}
}
@media(min-width:1024px){
  .a-list{grid-template-columns:repeat(3,1fr)}
  .shows-scroll{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>
<div id="app">
<!-- TDL -->
<div class="tab-page active" id="page-tdl">
  <div class="p-header tdl" id="hdr-tdl">
    <div class="h-top">
      <span class="park-icon">🏰</span>
      <div style="flex:1"><div class="park-name">東京ディズニーランド</div><div class="park-sub">Tokyo Disneyland · 千葉県浦安市</div></div>
      <button class="btn-ref" id="ref-tdl" onclick="doRefresh('tdl')">⟳</button>
    </div>
    <div class="h-info">
      <div class="h-chip weather-chip" id="wx-tdl">🌡 --°C</div>
      <div class="h-chip" id="hours-tdl">🕘 営業時間取得中…</div>
      <div class="h-chip" id="crowd-tdl">👥 --</div>
    </div>
    <div class="h-stats" id="stats-tdl"></div>
    <div class="h-search">
      <div class="search-inner">
        <span class="s-icon">🔍</span>
        <input id="sq-tdl" type="text" placeholder="施設名・エリアで検索…" oninput="onSearch('tdl')" autocomplete="off" spellcheck="false">
        <button class="s-clear" id="sc-tdl" onclick="clearSearch('tdl')">✕</button>
      </div>
    </div>
  </div>
  <div class="filter-bar"><div class="filter-scroll" id="fil-tdl"></div></div>
  <div class="scroll" id="scr-tdl">
    <div id="cnt-tdl"><div class="loading-box"><div class="spinner sp-tdl"></div><div class="load-text">リアルタイムデータを取得中…</div></div></div>
    <div class="data-src" id="src-tdl"></div>
  </div>
</div>
<!-- TDS -->
<div class="tab-page" id="page-tds">
  <div class="p-header tds" id="hdr-tds">
    <div class="h-top">
      <span class="park-icon">🌊</span>
      <div style="flex:1"><div class="park-name">東京ディズニーシー</div><div class="park-sub">Tokyo DisneySea · 千葉県浦安市</div></div>
      <button class="btn-ref" id="ref-tds" onclick="doRefresh('tds')">⟳</button>
    </div>
    <div class="h-info">
      <div class="h-chip weather-chip" id="wx-tds">🌡 --°C</div>
      <div class="h-chip" id="hours-tds">🕘 営業時間取得中…</div>
      <div class="h-chip" id="crowd-tds">👥 --</div>
    </div>
    <div class="h-stats" id="stats-tds"></div>
    <div class="h-search">
      <div class="search-inner">
        <span class="s-icon">🔍</span>
        <input id="sq-tds" type="text" placeholder="施設名・エリアで検索…" oninput="onSearch('tds')" autocomplete="off" spellcheck="false">
        <button class="s-clear" id="sc-tds" onclick="clearSearch('tds')">✕</button>
      </div>
    </div>
  </div>
  <div class="filter-bar"><div class="filter-scroll" id="fil-tds"></div></div>
  <div class="scroll" id="scr-tds">
    <div id="cnt-tds"><div class="loading-box"><div class="spinner sp-tds"></div><div class="load-text">リアルタイムデータを取得中…</div></div></div>
    <div class="data-src" id="src-tds"></div>
  </div>
</div>
<!-- USJ -->
<div class="tab-page" id="page-usj">
  <div class="p-header usj" id="hdr-usj">
    <div class="h-top">
      <span class="park-icon">🎬</span>
      <div style="flex:1"><div class="park-name">ユニバーサル・スタジオ・ジャパン</div><div class="park-sub">Universal Studios Japan · 大阪府大阪市</div></div>
      <button class="btn-ref" id="ref-usj" onclick="doRefresh('usj')">⟳</button>
    </div>
    <div class="h-info">
      <div class="h-chip weather-chip" id="wx-usj">🌡 --°C</div>
      <div class="h-chip" id="hours-usj">🕘 営業時間取得中…</div>
      <div class="h-chip" id="crowd-usj">👥 --</div>
    </div>
    <div class="h-stats" id="stats-usj"></div>
    <div class="h-search">

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.className='nav-btn';
    if(b.id==='nav-'+tab) b.classList.add('on-'+tab);
  });
  if(!loaded[tab]){loaded[tab]=true; initPark(tab);}
}

async function initPark(tab) {
  await Promise.all([loadWaitTimes(tab), loadWeather(tab), loadParkHours(tab)]);
}

async function doRefresh(tab) {
  const btn = document.getElementById('ref-'+tab);
  btn.classList.add('spin');
  // 混雑状態リセット（リフレッシュ時に再計算）
  S[tab].crowdFromData = false;
  S[tab].crowdStats = null;
  await Promise.all([loadWaitTimes(tab), loadWeather(tab), loadParkHours(tab)]);
  btn.classList.remove('spin');
}

// ═══════════════════════════════════════════
// WAIT TIMES
// 優先順: ①queue-times直接 → ②corsproxy経由 → ③themeparks.wiki → ④デモ
// ═══════════════════════════════════════════
const PROXY = 'https://corsproxy.io/?url=';

async function loadWaitTimes(tab) {
  const qtUrl = `https://queue-times.com/parks/${QUEUE_TIMES[tab]}/queue_times.json`;
  const tpUrl = `https://api.themeparks.wiki/v1/entity/${TPWIKI_IDS[tab]}/live`;

  // ① queue-times.com 直接
  try {
    const json = await getJSON(qtUrl, 6000);
    const items = flattenQueueTimes(json);
    if(items.length > 0) {
      setData(tab, items, false);
      setSrc(tab, 'queue-times.com', '5分ごと更新');
      return;
    }
  } catch(e){ console.info('[QT直接] '+e.message); }

  // ② queue-times.com → CORSプロキシ経由
  try {
    const json = await getJSON(PROXY + encodeURIComponent(qtUrl), 8000);
    const items = flattenQueueTimes(json);
    if(items.length > 0) {
      setData(tab, items, false);
      setSrc(tab, 'queue-times.com', 'proxy経由');
      return;
    }
  } catch(e){ console.info('[QTプロキシ] '+e.message); }

  // ③ themeparks.wiki（CORS対応の公式API）
  try {
    const json = await getJSON(tpUrl, 8000);
    const items = flattenTPWiki(json);
    if(items.length > 0) {
      setData(tab, items, false);
      setSrc(tab, 'themeparks.wiki', 'リアルタイム');
      return;
    }
  } catch(e){ console.info('[TPWiki] '+e.message); }

  // ④ デモデータ
  setData(tab, getDemoItems(tab), true);
  setSrc(tab, null, null);
}

function setData(tab, items, isDemo) {
  S[tab].items = items;
  S[tab].isDemo = isDemo;
  if(isDemo) {
    // API未接続確定 → 混雑チップを即座に「データなし」で固定
    const el = document.getElementById('crowd-'+tab);
    if(el) { el.className='h-chip'; el.innerHTML='📡 データなし'; }
  }
  renderAll(tab);
  // 実データが来たらリアル混雑度で上書き
  if(!isDemo) updateCrowdFromData(tab, items);
}

async function getJSON(url, ms) {
  const ctrl = new AbortController();
  const id = setTimeout(()=>ctrl.abort(), ms);
  const res = await fetch(url, {signal:ctrl.signal}).finally(()=>clearTimeout(id));
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

function fetchWithTimeout(url, ms) {
  return getJSON(url, ms);
}

function flattenQueueTimes(json) {
  const items = [];
  (json.lands||[]).forEach(land=>{
    (land.attractions||[]).forEach(a=>{
      items.push({
        id: String(a.id),
        name: translateName(a.name),
        area: translateName(land.name),
        status: a.is_open ? 'OPERATING' : 'CLOSED',
        waitTime: a.is_open ? (a.wait_time||0) : null,
        entityType: 'ATTRACTION',
        lastUpdated: a.last_updated,
      });
    });
  });
  return items;
}

function flattenTPWiki(json) {
  return (json.liveData||[]).map(d=>({
    id: d.id||d.entityId,
    name: translateName(d.name||'施設名不明'),
    area: translateName(d.area||''),
    status: d.status,
    waitTime: d.queue?.STANDBY?.waitTime ?? null,
    entityType: d.entityType||'ATTRACTION',
    lastUpdated: d.lastUpdated,
  }));
}

// WEATHER - Open-Meteo (no auth, CORS OK)
// ═══════════════════════════════════════════
async function loadWeather(tab) {
  const {lat,lon} = WEATHER_COORDS[tab];
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,precipitation&timezone=Asia%2FTokyo&forecast_days=1`;
    const json = await getJSON(url, 8000);
    const c = json.current;
    const wx = WX[c.weathercode] || {e:'🌡',n:''};
    const temp = Math.round(c.temperature_2m);
    const wind = Math.round(c.windspeed_10m);
    const rain = c.precipitation > 0;
    document.getElementById('wx-'+tab).innerHTML =
      `${wx.e} ${temp}°C <span style="opacity:.8;font-size:11px">${wx.n}${wind>20?' · 風強い':''}</span>`;
    // Crowd estimate based on weather + day of week
    updateCrowd(tab, temp, c.weathercode, rain);
  } catch(e) {
    document.getElementById('wx-'+tab).textContent = '🌡 天気取得失敗';
  }
}

// 天気・曜日ベースの予測混雑度（データ取得前の暫定表示）
function updateCrowd(tab, temp, code, rain) {
  // 既に実データから計算済みなら上書きしない
  if(S[tab].crowdFromData) return;
  // デモ（API未接続）時は混雑チップを「データなし」で固定
  if(S[tab].isDemo) {
    const el = document.getElementById('crowd-'+tab);
    el.className = 'h-chip';
    el.innerHTML = '📡 データなし';
    return;
  }
  const dow = new Date().getDay();
  const isWeekend = dow===0||dow===6;
  const isHoliday = false; // 祝日判定は簡略化
  const badWeather = code>=61;
  let level, label, emoji;
  if(badWeather)             { level='low';   emoji='🟢'; label='空いてます（雨天）'; }
  else if(isWeekend||isHoliday) { level='high';  emoji='🔴'; label='混雑（週末）'; }
  else if(dow===5)           { level='high';  emoji='🟠'; label='やや混雑（金曜）'; }
  else                       { level='mid';   emoji='🟡'; label='普通（平日）'; }
  const cls = {low:'crowd-low',mid:'crowd-mid',high:'crowd-high',vhigh:'crowd-vhigh'}[level];
  const el = document.getElementById('crowd-'+tab);
  el.className = 'h-chip '+cls;
  el.innerHTML = `${emoji} ${label}<span style="font-size:10px;opacity:.7;margin-left:4px">予測</span>`;
}

// 実データの平均待ち時間から混雑度を計算（最も正確）
function updateCrowdFromData(tab, items) {
  S[tab].crowdFromData = true;
  const withWait = items.filter(i=>isOpen(i)&&waitMin(i)<999);
  if(withWait.length===0) return;
  const avg = Math.round(withWait.reduce((s,i)=>s+waitMin(i),0)/withWait.length);
  const min = Math.min(...withWait.map(i=>waitMin(i)));
  const max = Math.max(...withWait.map(i=>waitMin(i)));
  let level, emoji, label, barW, barCls;
  if(avg < 15)      { level='low';   emoji='🟢'; label='空いてます！';  barW=20; barCls='cl'; }
  else if(avg < 25) { level='low';   emoji='🟢'; label='わりと空いてる'; barW=35; barCls='cl'; }
  else if(avg < 35) { level='mid';   emoji='🟡'; label='普通の混み具合'; barW=52; barCls='cm'; }
  else if(avg < 50) { level='high';  emoji='🟠'; label='やや混雑';      barW=70; barCls='ch'; }
  else if(avg < 65) { level='high';  emoji='🔴'; label='混雑中';        barW=82; barCls='cv'; }
  else              { level='vhigh'; emoji='🔴'; label='大混雑！';      barW=95; barCls='cv'; }
  // ヘッダーチップ更新
  const chipCls = {low:'crowd-low',mid:'crowd-mid',high:'crowd-high',vhigh:'crowd-vhigh'}[level];
  const el = document.getElementById('crowd-'+tab);
  el.className = 'h-chip '+chipCls;
  el.innerHTML = `${emoji} ${label}<span style="font-size:10px;opacity:.7;margin-left:4px">実測</span>`;
  // 混雑メーターカードを保存しておく（renderContentで使用）
  S[tab].crowdStats = {avg, min, max, barW, barCls, label, emoji, withWait:withWait.length};
}

// PARK HOURS - themeparks.wiki schedule
// ═══════════════════════════════════════════
async function loadParkHours(tab) {
  const today = new Date().toISOString().slice(0,10);
  try {
    const json = await getJSON(
      `https://api.themeparks.wiki/v1/entity/${TPWIKI_IDS[tab]}/schedule`, 8000);
    const todaySchedule = (json.schedule||[]).find(s=>{
      const d = (s.date||s.openingTime||'').slice(0,10);
      return d===today && s.type==='OPERATING';
    });
    if(todaySchedule) {
      const open = fmtTime(todaySchedule.openingTime);
      const close = fmtTime(todaySchedule.closingTime);
      S[tab].hours = {open,close};
      const diff = minsUntilClose(todaySchedule.closingTime);
      const urgency = diff>0&&diff<60 ? ` 🔔閉園まで${diff}分` : '';
      document.getElementById('hours-'+tab).innerHTML =
        `🕘 ${open} ～ ${close}${urgency}`;
    } else {
      setDefaultHours(tab);
    }
  } catch(e) {
    setDefaultHours(tab);
  }
}

function setDefaultHours(tab) {
  const defaults = {tdl:'9:00 ～ 21:00',tds:'9:00 ～ 21:00',usj:'9:00 ～ 22:00'};
  document.getElementById('hours-'+tab).textContent = '🕘 '+defaults[tab]+'（参考）';
}

function fmtTime(iso) {
  if(!iso) return '--:--';
  const d = new Date(iso);
  return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Tokyo'});
}

function minsUntilClose(iso) {
  if(!iso) return -1;
  return Math.floor((new Date(iso)-new Date())/60000);
}

function renderContent(tab) {
  const {items,filter,sort,search} = S[tab];
  if(!items) return;

  let list = items.map(it=>({...it, _cat:detectCat(it)}));

  // Stats
  const isDemo = S[tab].isDemo;
  const openItems = list.filter(i=>isOpen(i));
  const low = openItems.filter(i=>waitMin(i)<=20);
  const high = openItems.filter(i=>waitMin(i)>45);
  document.getElementById('stats-'+tab).innerHTML = `
    <div class="stat-chip"><span class="sdot g"></span>${openItems.length}施設営業中</div>
    ${!isDemo ? `<div class="stat-chip"><span class="sdot y"></span>20分以下 ${low.length}件</div>
    <div class="stat-chip"><span class="sdot r"></span>45分超 ${high.length}件</div>` : ''}
    <div class="stat-chip">📅 ${fmtDate()}</div>
  `;

  // Filter
  if(filter!=='all') list = list.filter(i=>i._cat===filter);
  // Search
  if(search.trim()){
    const q=search.trim().toLowerCase();
    list=list.filter(i=>(i.name||'').toLowerCase().includes(q)||(i.area||'').toLowerCase().includes(q));
  }
  // Sort
  list.sort((a,b)=>{
    if(sort==='wait'){
      const ao=isOpen(a),bo=isOpen(b);
      if(ao!==bo) return ao?-1:1;
      return waitMin(a)-waitMin(b);
    }
    return (a.name||'').localeCompare(b.name||'','ja');
  });

  let html = '';

  // 混雑メーター（filter=all && 検索なし）
  if(filter==='all' && !search.trim()) {
    html += renderCrowdMeter(tab);
  }

  // Shows section (only when filter=all and no search)
  const dbShows = DB[tab].shows;
  if(filter==='all' && !search.trim()) {
    html += renderShowsSection(tab, dbShows);
  }

  // Recommend section
  const recList = items
    .filter(i=>detectCat(i)==='ATTRACTION'&&isOpen(i)&&waitMin(i)<999)
    .sort((a,b)=>waitMin(a)-waitMin(b))
    .slice(0,4);
  if(filter==='all' && !search.trim() && recList.length>0) {
    html += renderRecommend(tab, recList);
  }

  // Park tips (only on initial view)
  if(filter==='all' && !search.trim()) {
    html += renderTips(tab);
  }

  // Sort bar
  const catLabel = filter==='all' ? '全施設' : CAT[filter]||filter;
  html += `<div class="sort-bar">
    <span class="sort-label">${catLabel} ${list.length}件</span>
    <select class="sort-sel" onchange="setSort('${tab}',this.value)">
      <option value="wait" ${sort==='wait'?'selected':''}>待ち時間順</option>
      <option value="name" ${sort==='name'?'selected':''}>名前順</option>
    </select>
  </div>`;

  // List
  if(list.length===0) {
    html += `<div class="no-res">😅「${esc(search)}」に一致する施設が見つかりません</div>`;
  } else {
    html += `<div class="a-list">`;
    list.forEach((item,idx)=>{
      html += renderAttrCard(item, tab, idx, list);
    });
    html += `</div>`;
  }

  document.getElementById('cnt-'+tab).innerHTML = html;
}

function renderShowsSection(tab, shows) {
  const now = new Date();
  const nowMins = now.getHours()*60 + now.getMinutes();
  let html = `<div class="section"><div class="sec-title">🎭 本日のショー・イベント</div></div>
    <div class="shows-scroll">`;
  shows.forEach(show=>{
    const timesHtml = show.times.map(t=>{
      if(t==='随時') return `<span class="show-time-chip next">${t}</span>`;
      const [hh,mm] = t.split(':').map(Number);
      const tMins = hh*60+mm;
      const isNext = tMins >= nowMins && tMins < nowMins+120;
      return `<span class="show-time-chip ${isNext?'next':''}">${t}</span>`;
    }).join('');
    html += `<div class="show-card">
      <div class="show-name">${show.icon} ${esc(show.name)}</div>
      <div class="show-loc">📍 ${esc(show.loc)}</div>
      <div class="show-times">${timesHtml}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

    <div class="m-stat">
      <span class="m-stat-l">最終更新</span>
      <span class="m-stat-r">${updated}</span>
    </div>
    ${db.tip?`<div class="m-highlight">
      <div class="m-highlight-title">💬 見どころ・攻略ポイント</div>
      <div class="m-highlight-text">${esc(db.tip)}</div>
    </div>`:''}
    ${open&&wm<20?`<div class="strategy-box">
      <div class="strategy-title">🎯 今すぐ行くべき！</div>
      <div class="strategy-text">現在の待ち時間は${wm}分と非常に短いです。
        このタイミングを逃さずすぐに向かいましょう！</div>
    </div>`:''}
    ${!open?`<div class="strategy-box" style="background:rgba(255,69,58,.05);border-color:rgba(255,69,58,.2)">
      <div class="strategy-title" style="color:#ff453a">⏰ 再オープン待ち</div>
      <div class="strategy-text">現在休止中です。公式アプリで再開情報を確認しながら、
        他のアトラクションを楽しんでおきましょう。</div>
    </div>`:''}
  `;
  document.getElementById('modal').classList.add('open');
}
function closeMBg(e){if(e.target===document.getElementById('modal'))closeModal();}
function closeModal(){document.getElementById('modal').classList.remove('open');}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function detectCat(item) {
  const t = (item.entityType||item.type||'').toUpperCase();
  if(t==='ATTRACTION'||t==='RIDE') return 'ATTRACTION';
  if(t==='SHOW'||t==='ENTERTAINMENT') return 'SHOW';
  if(t==='RESTAURANT'||t==='DINING'||t==='FOOD') return 'RESTAURANT';
  if(t==='SHOP'||t==='MERCHANDISE') return 'SHOP';
  if(t==='MEET_AND_GREET') return 'MEET_AND_GREET';
  const n=(item.name||'').toLowerCase();
  if(n.includes('レストラン')||n.includes('カフェ')||n.includes('ダイニング')||n.includes('ビュッフェ')) return 'RESTAURANT';
  if(n.includes('ショップ')||n.includes('ストア')||n.includes('マーケット')) return 'SHOP';
  if(n.includes('ショー')||n.includes('パレード')||n.includes('ライブ')) return 'SHOW';
  return 'ATTRACTION';
}
function isOpen(item){const s=(item.status||'').toUpperCase();return s==='OPERATING'||s==='OPEN';}
function waitMin(item){const w=item.waitTime??item.wait??item.queue?.STANDBY?.waitTime??null;return(w===null||w===undefined||w<0)?999:w;}
function waitCls(item){
  if(!isOpen(item)) return 'w-none';
  const w=waitMin(item);
  if(w>=999) return 'w-none';
  if(w<=15) return 'w-low';
  if(w<=30) return 'w-mid';
  if(w<=60) return 'w-hi';
  return 'w-vhi';
}
function fmtDate(){
  return new Date().toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'});
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setSrc(tab, source, detail) {
  const el = document.getElementById('src-'+tab);
  const now = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  if(S[tab].isDemo) {
    el.innerHTML = `<span class="demo-badge">⚠️ オフライン</span> 待ち時間データを取得できません（API未接続）· ${now}`;
  } else {
    el.innerHTML = `<span class="live-dot"></span> <b>${source}</b>（${detail}）· ${now}取得`;
  }
}
